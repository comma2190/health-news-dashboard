<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> 뉴스 수집기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg: #0f0f13; --surface: #16161d; --surface2: #1e1e28;
    --border: #2a2a38; --accent: #7c6af7; --accent2: #4fc3f7;
    --text: #e8e8f0; --text2: #8888a8;
    --success: #4caf82; --warning: #f7a94f; --error: #f76a6a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; padding:2rem; }
  header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:2.5rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border); }
  h1 { font-size:1.4rem; font-weight:700; letter-spacing:-0.02em; }
  h1 span { color:var(--accent); }
  .subtitle { font-size:0.8rem; color:var(--text2); margin-top:0.3rem; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; }
  .section-title { font-size:0.75rem; font-weight:600; color:var(--text2); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:1rem; }
  .controls { display:grid; grid-template-columns:1fr 1fr auto auto; gap:1rem; align-items:end; }
  label { display:block; font-size:0.72rem; color:var(--text2); margin-bottom:0.4rem; font-weight:500; letter-spacing:0.05em; text-transform:uppercase; }
  input[type=date], input[type=text], select {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:0.6rem 0.8rem; color:var(--text);
    font-family:'JetBrains Mono',monospace; font-size:0.85rem; outline:none;
    transition:border-color 0.2s;
  }
  input:focus, select:focus { border-color:var(--accent); }
  .btn { padding:0.65rem 1.4rem; border-radius:8px; border:none; font-family:'Noto Sans KR',sans-serif; font-size:0.85rem; font-weight:500; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:hover { background:#6a58e8; transform:translateY(-1px); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .btn-secondary { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
  .btn-secondary:hover { color:var(--text); border-color:var(--accent); }
  .keywords-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:0.5rem; margin-bottom:1rem; }
  .kw-tag { display:flex; align-items:center; gap:0.4rem; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:0.4rem 0.7rem; font-size:0.82rem; cursor:pointer; transition:all 0.15s; user-select:none; }
  .kw-tag.active { border-color:var(--accent); background:rgba(124,106,247,0.1); color:var(--accent); }
  .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .dot-medical { background:var(--accent); }
  .dot-care { background:var(--accent2); }
  .add-row { display:flex; gap:0.5rem; padding-top:1rem; border-top:1px solid var(--border); }
  .add-row input { flex:1; }
  .add-row select { width:120px; }
  .progress-wrap { display:none; }
  .progress-wrap.show { display:block; }
  .bar-bg { background:var(--surface2); border-radius:100px; height:6px; margin:0.8rem 0; overflow:hidden; }
  .bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:100px; transition:width 0.4s; width:0%; }
  .status { font-size:0.8rem; color:var(--text2); font-family:'JetBrains Mono',monospace; }
  .log { background:var(--surface2); border-radius:8px; padding:0.8rem; margin-top:0.8rem; max-height:140px; overflow-y:auto; font-family:'JetBrains Mono',monospace; font-size:0.73rem; line-height:1.8; }
  .ok { color:var(--success); } .err { color:var(--error); } .info { color:var(--text2); }

  /* 결과 카드 */
  .result-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:1rem; overflow:hidden; }
  .result-header { display:flex; align-items:center; gap:1rem; padding:1rem 1.2rem; cursor:pointer; transition:background 0.15s; }
  .result-header:hover { background:rgba(124,106,247,0.05); }
  .result-kw { font-weight:600; font-size:0.95rem; flex:1; }
  .result-count { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:1.1rem; color:var(--accent); min-width:60px; text-align:right; }
  .result-peak { font-size:0.72rem; color:var(--text2); min-width:120px; text-align:right; }
  .toggle-icon { color:var(--text2); font-size:0.8rem; transition:transform 0.2s; }
  .toggle-icon.open { transform:rotate(180deg); }
  .badge { display:inline-block; padding:0.2rem 0.5rem; border-radius:4px; font-size:0.7rem; font-weight:500; }
  .bm { background:rgba(124,106,247,0.15); color:var(--accent); }
  .bc { background:rgba(79,195,247,0.15); color:var(--accent2); }

  /* 그래프 */
  .chart-wrap { padding:1rem 1.2rem; border-top:1px solid var(--border); background:var(--surface2); }
  .chart-title { font-size:0.72rem; color:var(--text2); margin-bottom:0.8rem; }
  .chart-svg { width:100%; overflow:visible; }

  /* 기사 목록 */
  .articles-wrap { display:none; border-top:1px solid var(--border); }
  .articles-wrap.show { display:block; }
  .article-item { display:flex; align-items:flex-start; gap:0.8rem; padding:0.75rem 1.2rem; border-bottom:1px solid var(--border); transition:background 0.15s; }
  .article-item:last-child { border-bottom:none; }
  .article-item:hover { background:rgba(124,106,247,0.04); }
  .article-num { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text2); min-width:24px; padding-top:2px; }
  .article-info { flex:1; min-width:0; }
  .article-title { font-size:0.85rem; line-height:1.5; margin-bottom:0.2rem; }
  .article-title a { color:var(--text); text-decoration:none; }
  .article-title a:hover { color:var(--accent); }
  .article-meta { font-size:0.72rem; color:var(--text2); font-family:'JetBrains Mono',monospace; }

  .results-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
  .export-row { display:flex; gap:0.5rem; margin-top:1rem; justify-content:flex-end; }
  .results-wrap { display:none; }
  .results-wrap.show { display:block; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  input[type=date]::-webkit-calendar-picker-indicator { filter:invert(0.6); cursor:pointer; }
</style>
</head>
<body>
<header>
  <div>
    <h1>XI0 <span>뉴스 수집기</span></h1>
    <p class="subtitle">네이버 뉴스 검색 API · 날짜 범위 기사 건수 자동 수집</p>
  </div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text2)" id="lastRun"></div>
</header>

<div class="card">
  <div class="section-title">수집 설정</div>
  <div class="controls">
    <div><label>시작일</label><input type="date" id="startDate"></div>
    <div><label>종료일</label><input type="date" id="endDate"></div>
    <button class="btn btn-primary" id="runBtn" onclick="startCollection()">▶ 수집 시작</button>
    <button class="btn btn-secondary" onclick="resetAll()">초기화</button>
  </div>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <span class="section-title">키워드</span>
    <span style="font-size:0.78rem;color:var(--text2)" id="kwCount"></span>
  </div>
  <div class="keywords-grid" id="kwGrid"></div>
  <div class="add-row">
    <input type="text" id="newKw" placeholder="키워드 추가..." onkeydown="if(event.key==='Enter'&&!event.isComposing)addKw()">
    <select id="newCat">
      <option value="medical">보건의료</option>
      <option value="care">돌봄</option>
    </select>
    <button class="btn btn-secondary" onclick="addKw()">+ 추가</button>
  </div>
</div>

<div class="card progress-wrap" id="progressWrap">
  <div class="section-title">수집 중...</div>
  <div class="bar-bg"><div class="bar" id="bar"></div></div>
  <div class="status" id="status">준비 중...</div>
  <div class="log" id="log"></div>
</div>

<div class="results-wrap" id="resultsWrap">
  <div class="results-header">
    <span class="section-title">수집 결과</span>
    <span style="font-size:0.78rem;color:var(--text2)" id="meta"></span>
  </div>
  <div id="resultCards"></div>
  <div class="export-row">
    <button class="btn btn-secondary" onclick="exportCSV()">CSV 내보내기</button>
    <button class="btn btn-secondary" onclick="copyTable()">클립보드 복사</button>
  </div>
</div>

<script>
let keywords = [];
let results = [];
let running = false;

const API_BASE = 'https://news-api-three.vercel.app/api/naver';

function initDates() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('startDate').value = today;
  document.getElementById('endDate').value = today;
}

function renderKw() {
  document.getElementById('kwGrid').innerHTML = keywords.map((k, i) => `
    <div class="kw-tag active" id="kw${i}" onclick="toggleKw(${i})">
      <span class="dot dot-${k.cat}"></span>${k.text}
      <span style="margin-left:auto;color:var(--text2);font-size:0.7rem" onclick="removeKw(event,${i})">×</span>
    </div>`).join('');
  document.getElementById('kwCount').textContent = `${keywords.length}개`;
}

function toggleKw(i) { document.getElementById('kw'+i).classList.toggle('active'); }
function removeKw(e, i) { e.stopPropagation(); keywords.splice(i,1); renderKw(); }
function addKw() {
  const v = document.getElementById('newKw').value.trim();
  const c = document.getElementById('newCat').value;
  if (!v) return;
  keywords.push({text:v, cat:c});
  document.getElementById('newKw').value = '';
  renderKw();
 
}

function addLog(msg, type='info') {
  const el = document.createElement('div');
  el.className = type; el.textContent = msg;
  const log = document.getElementById('log');
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

async function fetchNaver(keyword, startDate, endDate) {
  const startMs = new Date(startDate).getTime();
  const endMs = new Date(endDate + 'T23:59:59').getTime();

  let articles = [];
  let startIdx = 1;
  let reachedEnd = false;

  while (!reachedEnd && startIdx <= 1000) {
    try {
      const res = await fetch(`${API_BASE}?keyword=${encodeURIComponent(keyword)}&start=${startIdx}`);
      if (!res.ok) break;
      const data = await res.json();
      if (!data.items || data.items.length === 0) break;

      for (const item of data.items) {
        const pubMs = new Date(item.pubDate).getTime();
        if (pubMs > endMs) continue;
        if (pubMs < startMs) { reachedEnd = true; break; }
        articles.push({
          title: item.title.replace(/<[^>]*>/g,'').replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&#0*39;/g,"'"),
          link: item.originallink || item.link,
          pubDate: item.pubDate,
          dateStr: new Date(item.pubDate).toISOString().split('T')[0],
        });
      }

      if (data.items.length < 100) break;
      startIdx += 100;
      await new Promise(r => setTimeout(r, 200));
    } catch(err) {
      console.error(err);
      break;
    }
  }

  return articles;
}

function buildDateChart(articles, startDate, endDate) {
  const dateCounts = {};
  const start = new Date(startDate);
  const end = new Date(endDate);

  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    dateCounts[d.toISOString().split('T')[0]] = 0;
  }

  articles.forEach(a => {
    if (dateCounts[a.dateStr] !== undefined) dateCounts[a.dateStr]++;
  });

  const dates = Object.keys(dateCounts).sort();
  const counts = dates.map(d => dateCounts[d]);
  const maxCount = Math.max(...counts, 1);

  const peakIdx = counts.indexOf(Math.max(...counts));
  const peakDate = dates[peakIdx];
  const peakCount = counts[peakIdx];

  // SVG 라인 차트
  const W = 800, H = 80, padL = 8, padR = 8, padT = 8, padB = 20;
  const n = dates.length;
  const xStep = n > 1 ? (W - padL - padR) / (n - 1) : 0;

  const pts = counts.map((c, i) => {
    const x = padL + i * xStep;
    const y = padT + (1 - c / maxCount) * (H - padT - padB);
    return [x, y];
  });

  // 폴리라인
  const polyline = pts.map(([x,y]) => `${x},${y}`).join(' ');

  // 영역 fill
  const areaPath = `M${padL},${H-padB} ` +
    pts.map(([x,y]) => `L${x},${y}`).join(' ') +
    ` L${padL + (n-1)*xStep},${H-padB} Z`;

  // 날짜 라벨 (최대 8개)
  const labelStep = Math.max(1, Math.ceil(n / 8));
  const labels = dates.map((d, i) => {
    if (i % labelStep !== 0 && i !== n-1) return '';
    const x = padL + i * xStep;
    return `<text x="${x}" y="${H}" font-size="9" fill="#8888a8" text-anchor="middle" font-family="JetBrains Mono">${d.slice(5)}</text>`;
  }).join('');

  // 피크 포인트
  const [px, py] = pts[peakIdx];
  const peakDot = peakCount > 0
    ? `<circle cx="${px}" cy="${py}" r="4" fill="#f7a94f" stroke="#0f0f13" stroke-width="1.5"/>
       <text x="${px}" y="${py-8}" font-size="9" fill="#f7a94f" text-anchor="middle" font-family="JetBrains Mono">${peakCount}</text>`
    : '';

  // 일반 포인트
  const dots = pts.map(([x,y], i) => {
    if (i === peakIdx) return '';
    return counts[i] > 0
      ? `<circle cx="${x}" cy="${y}" r="2.5" fill="#7c6af7" opacity="0.8"/>`
      : '';
  }).join('');

  const bars = `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:90px">
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#7c6af7" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#7c6af7" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <path d="${areaPath}" fill="url(#areaGrad)"/>
    <polyline points="${polyline}" fill="none" stroke="#7c6af7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${peakDot}
    ${labels}
  </svg>`;

  return { bars, peakDate, peakCount, dateCounts };
}

async function startCollection() {
  if (running) return;
  const s = document.getElementById('startDate').value;
  const e = document.getElementById('endDate').value;
  if (!s || !e) { alert('날짜를 입력해주세요'); return; }

  const active = keywords.filter((_,i) => document.getElementById('kw'+i)?.classList.contains('active'));
  if (!active.length) { alert('키워드를 추가해주세요'); return; }

  running = true; results = [];
  document.getElementById('runBtn').disabled = true;
  document.getElementById('progressWrap').classList.add('show');
  document.getElementById('resultsWrap').classList.remove('show');
  document.getElementById('log').innerHTML = '';

  addLog(`수집 시작: ${s} ~ ${e}`, 'info');
  addLog(`키워드 ${active.length}개`, 'info');

  for (let i = 0; i < active.length; i++) {
    const k = active[i];
    document.getElementById('bar').style.width = Math.round(i/active.length*100)+'%';
    document.getElementById('status').textContent = `[${i+1}/${active.length}] "${k.text}" 수집 중...`;
    
    const articles = await fetchNaver(k.text, s, e);
    const { bars, peakDate, peakCount, dateCounts } = buildDateChart(articles, s, e);
    
    results.push({ ...k, count: articles.length, articles, bars, peakDate, peakCount, dateCounts });
    addLog(`✓ ${k.text}: ${articles.length}건 (피크: ${peakDate} ${peakCount}건)`, articles.length > 0 ? 'ok' : 'info');
    await new Promise(r => setTimeout(r, 200));
  }

  document.getElementById('bar').style.width = '100%';
  document.getElementById('status').textContent = `완료! ${active.length}개 수집 완료`;
  running = false;
  document.getElementById('runBtn').disabled = false;

  renderResults(s, e);
  document.getElementById('lastRun').textContent = '마지막 수집: ' + new Date().toLocaleString('ko-KR');
}

function renderResults(s, e) {
  const sorted = [...results].sort((a,b) => b.count - a.count);
  document.getElementById('meta').textContent = `${s} ~ ${e} · 총 ${results.reduce((a,r)=>a+r.count,0)}건`;

  document.getElementById('resultCards').innerHTML = sorted.map((r, i) => `
    <div class="result-card">
      <div class="result-header" onclick="toggleArticles('card${i}')">
        <span class="rank" style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:0.72rem;font-weight:700;font-family:'JetBrains Mono',monospace;background:var(--surface2);color:var(--text2);${i<3?'background:rgba(124,106,247,0.15);color:var(--accent)':''}">${i+1}</span>
        <span class="result-kw">${r.text}</span>
        <span class="badge ${r.cat==='medical'?'bm':'bc'}">${r.cat==='medical'?'보건의료':'돌봄'}</span>
        <span class="result-count">${r.count.toLocaleString()}건</span>
        ${r.peakCount > 0 ? `<span class="result-peak">📈 ${r.peakDate} (${r.peakCount}건)</span>` : ''}
        <span class="toggle-icon" id="icon${i}">▼</span>
      </div>
      ${r.count > 0 ? `
      <div class="chart-wrap">
        <div class="chart-title">날짜별 기사 건수</div>
        <div class="chart">${r.bars}</div>
      </div>` : ''}
      <div class="articles-wrap" id="card${i}">
        ${r.articles.length > 0 ? r.articles.map((a, j) => `
          <div class="article-item">
            <span class="article-num">${j+1}</span>
            <div class="article-info">
              <div class="article-title"><a href="${a.link}" target="_blank">${a.title}</a></div>
              <div class="article-meta">${a.dateStr}</div>
            </div>
          </div>`).join('') : '<div style="padding:1rem 1.2rem;color:var(--text2);font-size:0.85rem">기사가 없습니다</div>'}
      </div>
    </div>`).join('');

  document.getElementById('resultsWrap').classList.add('show');
}

function toggleArticles(id) {
  const el = document.getElementById(id);
  const idx = id.replace('card','');
  const icon = document.getElementById('icon'+idx);
  el.classList.toggle('show');
  icon.classList.toggle('open');
}

function resetAll() {
  results = [];
  document.getElementById('resultsWrap').classList.remove('show');
  document.getElementById('progressWrap').classList.remove('show');
  document.getElementById('bar').style.width = '0%';
}

function exportCSV() {
  if (!results.length) return;
  const sorted = [...results].sort((a,b)=>b.count-a.count);
  const rows = [['순위','키워드','분류','기사건수','피크날짜','피크건수']];
  sorted.forEach((r,i)=>rows.push([i+1,r.text,r.cat==='medical'?'보건의료':'돌봄',r.count,r.peakDate||'-',r.peakCount||0]));
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = `news_${document.getElementById('startDate').value}_${document.getElementById('endDate').value}.csv`;
  a.click();
}

function copyTable() {
  if (!results.length) return;
  const sorted = [...results].sort((a,b)=>b.count-a.count);
  navigator.clipboard.writeText(sorted.map((r,i)=>`${i+1}\t${r.text}\t${r.cat==='medical'?'보건의료':'돌봄'}\t${r.count}\t${r.peakDate||'-'}`).join('\n'))
    .then(()=>alert('클립보드에 복사됐습니다'));
}

initDates();
renderKw();
</script>
</body>
</html>
